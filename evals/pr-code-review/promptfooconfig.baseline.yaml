description: "pr-code-review BASELINE (no skill) — full-suite A/B control"

# ─────────────────────────────────────────────────────────────────────────────
# BASELINE ARM of the pr-code-review eval.
#
# This config is identical to promptfooconfig.yaml (the skill arm) in grader,
# rubric, and threshold — the ONLY difference is the provider:
#
#   skill arm    → ../kiro-review.sh   (injects review-checklist.md + precision gates)
#   baseline arm → ../kiro-baseline.sh (bare model, same pin, no skill machinery)
#
# It carries a REPRESENTATIVE SUBSET of the full suite — one test per metric
# (security, correctness, resource-management, resilience, performance,
# licensing) plus a false-positive-avoidance negative — so a run is cheap while
# still covering every scoring dimension. The prompts are copied verbatim from
# the skill arm so the comparison is apples-to-apples.
#
# HOW TO PRODUCE THE EVIDENCE OF VALUE:
#   cd evals/pr-code-review
#   promptfoo eval -c promptfooconfig.baseline.yaml --no-cache   # skill OFF
#   promptfoo eval -c promptfooconfig.yaml          --no-cache   # skill ON
#   promptfoo view   # compare per-metric scores; the delta is the skill's lift
#
# Results are stored in ~/.promptfoo/output.db (browse with `promptfoo view`).
outputPath: ./results.baseline.json

providers:
  - id: "exec: ../kiro-baseline.sh"
    label: "kiro-cli-baseline"

prompts:
  - "{{prompt}}"

# Same grader, rubric, and threshold as the skill arm — see promptfooconfig.yaml
# for the full annotated version. Duplicated here (not shared) so this control
# config is self-contained and runnable on its own.
defaultTest:
  threshold: 0.75
  options:
    provider:
      id: "exec: ../kiro-grade.sh"
      label: "kiro-cli-grader"
    rubricPrompt: |
      You are a strict evaluator of CODE REVIEW QUALITY. You are grading the output of an
      automated code-review skill against a single review criterion.

      [CRITERION THE REVIEW MUST SATISFY]
      {{rubric}}

      [THE REVIEW OUTPUT TO GRADE]
      {{output}}

      Score the review on this 1-5 scale, judging ONLY against the criterion above:

      5 (Excellent): Fully satisfies the criterion. Identifies the issue precisely (or, for a
        "does not flag" criterion, correctly stays silent), explains the impact, and gives a
        correct, actionable fix. No fabricated or irrelevant issues.
      4 (Good): Satisfies the criterion. Identifies the issue and gives a usable fix, but the
        explanation or fix is slightly thin or imprecise. Minor noise is acceptable.
      3 (Adequate): Partially satisfies the criterion. Mentions the issue vaguely or buries it,
        OR identifies it but gives a weak/partial fix, OR adds some fabricated minor issues.
      2 (Poor): Barely touches the criterion. Hints at the area but misses the actual issue, or
        the recommendation is wrong, or it fabricates a significant non-issue.
      1 (Fail): Does not satisfy the criterion at all. Misses the issue entirely, or (for a
        "does not flag" criterion) fabricates the issue it should have ignored.

      Be skeptical. Reserve 5 for genuinely strong reviews. A review that "sort of" mentions the
      issue is a 3, not a 4. For negative tests (criteria beginning with "Does not"), a review
      that invents the problem it should have ignored is a 1.

      Return ONLY a JSON object. Output the raw JSON object only — no markdown code
      fences, no preamble, no trailing commentary, and no newlines inside string values:
      {
        "reason": "<1-3 sentences: what the review did well or poorly against the criterion, citing specifics>",
        "score": <0.0-1.0, computed as (rating - 1) / 4 — i.e. 5->1.0, 4->0.75, 3->0.5, 2->0.25, 1->0.0>,
        "pass": <true if score >= 0.75, else false>
      }

tests:
  # ─── POSITIVE: Catches real bugs ────────────────────────────────────────────

  # SQL injection
  - description: "SQL injection via f-string"
    vars:
      prompt: |
        Review this Python code:
        ```python
        def get_user(user_id):
            query = f"SELECT * FROM users WHERE id = {user_id}"
            return db.execute(query)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies SQL injection risk and recommends parameterized queries."
        metric: security

  # Missing HTTP error handling
  - description: "missing HTTP error handling"
    vars:
      prompt: |
        Review this JavaScript code:
        ```javascript
        async function fetchUserData(userId) {
          const response = await fetch(`/api/users/${userId}`);
          const data = await response.json();
          return data;
        }
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that failed HTTP responses and network errors are not handled."
        metric: correctness

  # Race condition
  - description: "race condition on read-modify-write"
    vars:
      prompt: |
        Review this code used in a multi-threaded web server:
        ```python
        class Counter:
            def __init__(self):
                self.count = 0

            def increment(self):
                current = self.count
                self.count = current + 1
        ```
    assert:
      - type: llm-rubric
        value: "Identifies the race condition when increment is called concurrently."
        metric: correctness

  # Stale closure + missing key prop (React)
  - description: "React stale closure and missing key prop"
    vars:
      prompt: |
        Review this React component:
        ```tsx
        function UserList({ users }) {
          const [filtered, setFiltered] = useState(users);
          useEffect(() => {
            setFiltered(users.filter(u => u.active));
          }, []);
          return <ul>{filtered.map(user => <li>{user.name}</li>)}</ul>;
        }
        ```
    assert:
      - type: llm-rubric
        value: "Identifies the stale closure (missing users in useEffect dependency array) and the missing key prop on list items."
        metric: correctness

  # Sync-over-async (unique to your skill's requirements)
  - description: "sync-over-async run_until_complete"
    vars:
      prompt: |
        Review this Python code that wraps async logic for sync callers:
        ```python
        class SyncClient:
            def fetch(self, url: str) -> dict:
                loop = asyncio.get_event_loop()
                return loop.run_until_complete(self._async_fetch(url))

            async def _async_fetch(self, url: str) -> dict:
                async with aiohttp.ClientSession() as session:
                    async with session.get(url) as resp:
                        return await resp.json()
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that run_until_complete (or get_event_loop) fails with RuntimeError when called from within an already-running event loop. Recommends at least one valid remediation, such as: guarding with asyncio.get_running_loop(), using asyncio.run_coroutine_threadsafe, running the coroutine on a dedicated thread with its own event loop, or using asyncio.run() with an acknowledgement of its running-loop caveat. Do not require any single specific API — any technically correct approach to safely bridging sync and async should pass."
        metric: correctness

  # Silent partial failure in bulk writes (unique to your skill)
  - description: "silent partial failure in bulk insert"
    vars:
      prompt: |
        Review this Python code that inserts documents in bulk:
        ```python
        def insert_documents(docs: list[dict]) -> None:
            for doc in docs:
                try:
                    db.insert(doc)
                except Exception as e:
                    logger.error(f"Failed to insert {doc['id']}: {e}")
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that failures are silently swallowed — the caller has no way to know which documents were not inserted. Recommends collecting failures and raising after the loop."
        metric: correctness

  # Resource leak on error path
  - description: "resource leak — close() misses _pool"
    vars:
      prompt: |
        Review this Python class:
        ```python
        class DBClient:
            def __init__(self, url: str):
                self._conn = create_connection(url)
                self._pool = create_pool(url)

            def close(self):
                self._conn.close()
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that close() only cleans up _conn and leaks _pool. Every resource initialized in __init__ must have a cleanup path."
        metric: resource-management

  # ValkeySearch query injection (domain-specific)
  - description: "ValkeySearch tag query injection"
    vars:
      prompt: |
        Review this Python function that constructs a ValkeySearch query:
        ```python
        def search_by_tag(tag_value: str) -> list:
            query = f"@category:{{{tag_value}}}"
            return client.ft("idx").search(query)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that tag_value is interpolated directly into the query without escaping, allowing query injection. Recommends escaping special characters including pipe, tilde, and other FT.SEARCH metacharacters."
        metric: security

  # Missing timeout on external client
  - description: "missing timeout on Redis/Valkey client"
    vars:
      prompt: |
        Review this Python code that creates a Redis/Valkey client:
        ```python
        def create_client(host: str, port: int) -> redis.Redis:
            return redis.Redis(host=host, port=port)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that no timeout is configured on the connection. Missing timeouts can cause cascading hangs in production. Recommends setting socket_timeout and socket_connect_timeout."
        metric: resilience

  # ─── NEGATIVE: Does NOT fabricate issues in correct code ────────────────────

  # Correct Rust error handling
  - description: "negative — correct Rust error handling"
    vars:
      prompt: |
        Review this Rust function:
        ```rust
        fn parse_config(path: &str) -> Result<Config, ConfigError> {
            let content = std::fs::read_to_string(path)
                .map_err(|e| ConfigError::Io(e))?;
            let config: Config = serde_json::from_str(&content)
                .map_err(|e| ConfigError::Parse(e))?;
            if config.max_connections == 0 {
                return Err(ConfigError::Validation("max_connections must be > 0".into()));
            }
            Ok(config)
        }
        ```
    assert:
      - type: llm-rubric
        value: "Does not invent critical bugs. Acknowledges the code handles errors well. Any suggestions are minor improvements, not fabricated vulnerabilities."
        metric: false-positive-avoidance

  # Correct Optional[int] truthiness check — does NOT flag valid code as buggy
  - description: "negative — correct Optional[int] is-not-None check"
    vars:
      prompt: |
        Review this Python function that accepts an optional integer:
        ```python
        def set_limit(limit: Optional[int] = None) -> None:
            if limit is not None:
                self._limit = limit
        ```
    assert:
      - type: llm-rubric
        value: "Does not flag this as an issue. The use of 'is not None' is correct for Optional[int] where 0 is a valid value. A review that flags this as wrong would be a false positive."
        metric: false-positive-avoidance

  # Correct async context manager usage
  - description: "negative — correct async context manager usage"
    vars:
      prompt: |
        Review this Python async code:
        ```python
        async def fetch_data(url: str) -> dict:
            async with aiohttp.ClientSession() as session:
                async with session.get(url) as resp:
                    resp.raise_for_status()
                    return await resp.json()
        ```
    assert:
      - type: llm-rubric
        value: "Does not fabricate resource leak issues. The code correctly uses async context managers for both session and response. raise_for_status() correctly handles HTTP errors. Any suggestions are minor improvements only."
        metric: false-positive-avoidance

  # ─── RESILIENCE: Operational safety patterns ────────────────────────────────

  # Silent fallback with no operator-visible logging
  - description: "silent fallback to local storage in distributed deployment"
    vars:
      prompt: |
        Review this Python code used in a multi-node service:
        ```python
        def get_cache_backend(config):
            try:
                from valkey_glide import GlideClient
                return DistributedCache(GlideClient(config.valkey_url))
            except ImportError:
                return InMemoryCache()
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that the fallback to InMemoryCache is silent — in a multi-node deployment the cache will no longer be shared across nodes, which is a correctness problem operators cannot see. Recommends logging a clear warning that communicates the consequence (cache not shared across nodes), not just the cause. Bonus if it suggests making the fallback opt-in or surfacing it via a health/readiness check."
        metric: resilience

  # Missing deadline/timeout on a gRPC call
  - description: "missing deadline on gRPC call"
    vars:
      prompt: |
        Review this Python code that calls a gRPC service:
        ```python
        def fetch_profile(stub, user_id: str) -> Profile:
            request = ProfileRequest(user_id=user_id)
            return stub.GetProfile(request)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that the gRPC call has no deadline/timeout. Without a deadline the call can hang indefinitely if the server is slow or unresponsive, causing cascading hangs upstream. Recommends passing an explicit timeout (e.g. stub.GetProfile(request, timeout=N))."
        metric: resilience

  # No retry/backoff on a transient external operation
  - description: "no retry or backoff on transient external call"
    vars:
      prompt: |
        Review this Python code that publishes to an external queue:
        ```python
        def publish_event(client, event: dict) -> None:
            client.publish("events", json.dumps(event))
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that a transient failure (network blip, broker unavailable) will cause the publish to fail outright with no retry or backoff. Recommends adding bounded retries with exponential backoff for transient errors, while being careful not to retry non-retryable errors. Should NOT demand a full circuit-breaker for this small snippet — a reasonable retry/backoff suggestion is sufficient."
        metric: resilience

  # ─── COVERAGE: skill rules that previously had no test ──────────────────────

  # Silent truncation limit
  - description: "silent truncation via hardcoded LIMIT"
    vars:
      prompt: |
        Review this Python function:
        ```python
        def get_recent_orders(db, customer_id: str) -> list:
            return db.execute(
                "SELECT * FROM orders WHERE customer_id = ? LIMIT 0, 10000",
                (customer_id,),
            )
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that the hardcoded 10000 limit silently truncates results — a customer with more than 10000 orders loses data with no error or warning to the caller. Recommends at minimum extracting it to a named constant, and ideally logging a warning when the limit is hit or making it configurable / paginated."
        metric: correctness

  # Operator completeness across CRUD methods
  - description: "operator not handled in delete path"
    vars:
      prompt: |
        Review this Python filter handling. select() and delete() are supposed to support the same operators:
        ```python
        def _apply(self, op, field, value, query):
            if op == "EQUAL":
                query.where(field == value)
            elif op == "NOT_EQUAL":
                query.search(field, negate=True)  # falls through to full search

        def select(self, op, field, value):
            q = Query()
            self._apply(op, field, value, q)
            return q.run()

        def delete(self, op, field, value):
            q = Query()
            if op == "EQUAL":
                q.where(field == value)
            return q.delete()  # NOT_EQUAL silently does nothing
        ```
    assert:
      - type: llm-rubric
        value: "Identifies the core defect: delete() does not route through _apply and only handles EQUAL, so a NOT_EQUAL delete does not apply the intended filter — unlike select(), which handles NOT_EQUAL via _apply. Accept EITHER plausible consequence for the unfiltered NOT_EQUAL path: that it silently deletes nothing (no-op), OR that q.delete() on an unfiltered query deletes every row (a critical data-loss bug, which is the correct behavior in common ORMs like SQLAlchemy/Django and a legitimately more severe reading than the code's inline comment claims). Recommends handling the same operator set across all CRUD paths (or sharing the _apply logic). PASS as long as the operator-parity root cause is identified and a sound fix is given; do NOT fail solely because the review picked the 'deletes everything' consequence over 'deletes nothing'."
        metric: correctness

  # Unbounded iteration over external data
  - description: "unbounded SCAN with no safety limit"
    vars:
      prompt: |
        Review this Python code that scans a Redis/Valkey keyspace:
        ```python
        def collect_all_keys(client, pattern: str) -> list:
            keys = []
            cursor = 0
            while True:
                cursor, batch = client.scan(cursor, match=pattern)
                keys.extend(batch)
                if cursor == 0:
                    break
            return keys
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that this collects ALL matching keys into memory with no upper bound — on a keyspace with millions of keys this can exhaust memory or run for a very long time. Recommends a max-iterations or max-items safety cap, streaming/yielding instead of accumulating, or early termination once enough items are gathered."
        metric: resilience

  # Partial failure cleanup / idempotent recovery
  - description: "cleanup skipped after early return on partial failure"
    vars:
      prompt: |
        Review this Python index-reset logic:
        ```python
        def reset_index(client, index_name: str, key_prefix: str) -> None:
            try:
                client.ft(index_name).dropindex()
            except IndexNotFoundError:
                return  # index already gone — bail out
            for key in client.scan_iter(match=f"{key_prefix}:*"):
                client.delete(key)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that when the index is already gone the function returns early and SKIPS the key cleanup, leaving orphaned keys forever. Recommends running the key cleanup unconditionally (not gated by the dropindex success) so recovery is idempotent."
        metric: resilience

  # Cloud readiness — missing TLS/auth for managed Valkey/Redis
  - description: "missing TLS and auth for cloud-hosted cache"
    vars:
      prompt: |
        Review this Python connector intended for production use against managed Redis/Valkey (e.g. AWS ElastiCache):
        ```python
        def connect(host: str, port: int = 6379):
            return redis.Redis(host=host, port=port)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that this is not cloud/production ready: no TLS/SSL support (required by managed services like ElastiCache/MemoryDB/Azure Cache), no authentication (token/password), and no connection pooling or request timeout configuration. Recommends making TLS and auth configurable with sensible defaults. (It is acceptable if it focuses on TLS and auth as the most critical gaps.)"
        metric: resilience

  # Multiple escape contexts — TEXT phrase query, not just TAG
  - description: "naive escaping of FT TEXT phrase query"
    vars:
      prompt: |
        Review this Python code that builds a ValkeySearch/RediSearch TEXT phrase query:
        ```python
        def search_phrase(client, user_text: str) -> list:
            escaped = user_text.replace('"', '')   # strip quotes only
            query = f'@body:"{escaped}"'
            return client.ft("idx").search(query)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that stripping only double quotes is insufficient escaping for a TEXT phrase query — other FT query metacharacters can still alter or break out of the query, and silently deleting user input also changes search semantics. Notes that TEXT phrase fields need their own proper escape function distinct from TAG escaping, validated against the engine's query syntax."
        metric: security

  # Async cleanup — unawaited close() promise
  - description: "unawaited async close() in dispose"
    vars:
      prompt: |
        Review this TypeScript code:
        ```typescript
        class CacheClient {
          private client: GlideClient;
          constructor(client: GlideClient) {
            this.client = client;
          }
          async dispose(): Promise<void> {
            this.client.close();  // close() returns a Promise
          }
        }
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that client.close() returns a Promise that is not awaited, so dispose() resolves before the connection is actually closed — risking a half-open connection or the process exiting before cleanup completes. Recommends `await this.client.close();`."
        metric: resource-management
  # ─── COVERAGE GAP FILL: checklist rules with no prior snippet test ──────────

  # Secret handling — hardcoded credential (Security checklist, previously untested)
  - description: "hardcoded credential in source"
    vars:
      prompt: |
        Review this Python module:
        ```python
        import requests

        API_KEY = "key_9f8e7d6c5b4a3210fedcba9876543210"

        def charge(amount: int):
            return requests.post(
                "https://api.payments.example/v1/charges",
                headers={"Authorization": f"Bearer {API_KEY}"},
                json={"amount": amount},
            )
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that a live secret/API key is hardcoded in source, which is a security risk (leaks via VCS history, logs, and shared code). Recommends loading it from an environment variable or a secrets manager, and rotating the exposed key. Bonus if it notes the key should never have been committed."
        metric: security

  # Secret handling — negative: correct env-var usage is NOT a finding
  - description: "negative — secret correctly loaded from env"
    vars:
      prompt: |
        Review this Python module:
        ```python
        import os
        import requests

        def charge(amount: int):
            api_key = os.environ.get("PAYMENTS_API_KEY")
            if not api_key:
                raise RuntimeError("PAYMENTS_API_KEY is not set")
            return requests.post(
                "https://api.payments.example/v1/charges",
                headers={"Authorization": f"Bearer {api_key}"},
                json={"amount": amount},
                timeout=10,
            )
        ```
    assert:
      - type: llm-rubric
        value: "This test is about NOT fabricating a secret-handling vulnerability. The key is correctly sourced from an environment variable (with a clear error when unset) and a request timeout is set. PASS if the review does NOT claim the secret is hardcoded/embedded in source, does NOT treat secret handling as a real security issue, and does NOT demand the key be moved out of the code. Minor, clearly-secondary suggestions (logging, retries, type hints) are acceptable and must not cause a fail. FAIL only if the review invents a hardcoded-secret or insecure-credential-storage problem that is not present."
        metric: false-positive-avoidance

  # Optional-numeric truthiness — POSITIVE direction (only the negative existed before)
  - description: "Optional[int] truthiness drops valid zero"
    vars:
      prompt: |
        Review this Python function. limit is an optional integer where 0 is a meaningful value (no results):
        ```python
        def set_limit(self, limit: Optional[int] = None) -> None:
            if limit:
                self._limit = limit
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that 'if limit:' is wrong for an Optional[int] where 0 is valid — a caller passing 0 is silently ignored and the limit is never set, because 0 is falsy. Recommends 'if limit is not None:'. Must catch the actual bug, not merely restate the types."
        metric: correctness

  # Performance — N+1 query pattern (entire Performance category was untested)
  - description: "N+1 query pattern in a loop"
    vars:
      prompt: |
        Review this Python code that loads orders for a list of users:
        ```python
        def load_orders(db, user_ids: list[int]) -> dict[int, list]:
            result = {}
            for uid in user_ids:
                result[uid] = db.execute(
                    "SELECT * FROM orders WHERE user_id = ?", (uid,)
                ).fetchall()
            return result
        ```
    assert:
      - type: llm-rubric
        value: "Identifies the N+1 query pattern — one query per user_id means N round-trips that grow linearly with the input. Recommends a single batched query (e.g. WHERE user_id IN (...) or a JOIN) and grouping the results in memory. Should focus on the round-trip count, not fabricate unrelated issues."
        metric: performance

  # Licensing — incompatible dependency license (Dependencies/Build/Licensing rule)
  - description: "GPL dependency added to an MIT-licensed project"
    vars:
      prompt: |
        Review this dependency addition. The project is MIT-licensed (per its LICENSE file and package metadata):
        ```diff
        # pyproject.toml
         [project]
         name = "widget-sdk"
         license = { text = "MIT" }
         dependencies = [
           "httpx>=0.27",
        +  "gpl-only-parser>=2.0",   # this library is licensed GPL-3.0
         ]
        ```
    assert:
      - type: llm-rubric
        value: "Identifies a license-compatibility problem: adding a GPL-3.0 dependency to an MIT-licensed project can impose copyleft obligations incompatible with MIT distribution. Recommends verifying the license, seeking an MIT/BSD/Apache-licensed alternative, or consulting on licensing before adding it. A review that ignores the license issue fails."
        metric: licensing

# ─── Intentionally NOT covered by snippet tests ─────────────────────────────
# The following review-checklist categories require project-level context that a
# self-contained code snippet cannot supply, so they are exercised by full
# PR-based review runs rather than these unit-style rubrics:
#   - API consistency      (needs comparable sibling implementations to compare against)
#   - Test quality/coverage (the snippet under review has no accompanying test files)
#   - Dependency CVEs       (needs a version/advisory-registry lookup)
#   - Design fit/scalability (needs the surrounding system architecture)
#   - Documentation accuracy (subjective; needs the broader codebase/README)
# Forcing these into single-snippet rubrics would yield noisy, unreliable grades.
# This omission is deliberate, not an oversight.
