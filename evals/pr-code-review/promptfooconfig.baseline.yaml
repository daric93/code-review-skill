  # --- Test Case 38: Operator Not Handled In Delete Path (correctness / CRUD parity) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        # select() and delete() are supposed to support the same operators.
        def _apply(self, op, field, value, query):
            if op == "EQUAL":
                query.where(field == value)
            elif op == "NOT_EQUAL":
                query.search(field, negate=True)

        def select(self, op, field, value):
            q = Query()
            self._apply(op, field, value, q)
            return q.run()

        def delete(self, op, field, value):
            q = Query()
            if op == "EQUAL":
                q.where(field == value)
            return q.delete()  # NOT_EQUAL silently does nothing
        ```
    assert:
      - type: llm-rubric
        value: "Identifies the core defect: delete() does not route through _apply and only handles EQUAL, so a NOT_EQUAL delete does not apply the intended filter — unlike select(), which handles NOT_EQUAL via _apply. Accept EITHER plausible consequence for the unfiltered NOT_EQUAL path: that it silently deletes nothing (no-op), OR that q.delete() on an unfiltered query deletes every row (a critical data-loss bug in common ORMs). Recommends handling the same operator set across all CRUD paths (or sharing _apply). PASS as long as the operator-parity root cause is identified and a sound fix is given; do NOT fail solely because the review picked one consequence over the other."
        metric: correctness

