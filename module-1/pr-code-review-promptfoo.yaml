description: "pr-code-review skill eval — Module 1 baseline"

prompts:
  - id: pr-code-review
    raw: |
      {{skill_prompt}}

      ---

      Review the following code:

      {{code}}

defaultTest:
  options:
    provider: "exec: node ./claude.js"

providers:
  - id: "exec: node ./claude.js"
    label: "sonnet"
    config:
      model: sonnet
  - id: "exec: node ./claude.js"
    label: "haiku"
    config:
      model: haiku

tests:
  # --- Test Case 1: SQL Injection (security recall) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        # app/db/queries.py
        def search_users(name_filter: str) -> list[dict]:
            query = f"SELECT id, email FROM users WHERE name LIKE '%{name_filter}%'"
            return db.execute(query).fetchall()
        ```
    assert:
      - type: llm-rubric
        value: "The review identifies SQL injection: name_filter is interpolated directly into the SQL query string without parameterization. The review names the attack class (SQL injection) and explains the impact (arbitrary data access, modification, or deletion)."
        metric: security
      - type: llm-rubric
        value: "The review provides a concrete parameterized-query fix that shows how the LIKE wildcards move into the parameter value (e.g., passing f'%{name_filter}%' as the parameter). Not just 'use parameterized queries' without showing the pattern."
        metric: security-fix
      - type: llm-rubric
        value: "The review does NOT suggest input validation alone as a sufficient fix, and does NOT hallucinate additional vulnerabilities (such as authentication issues or missing error handling) that do not exist in this 3-line snippet."
        metric: false-positive-avoidance

  # --- Test Case 2: Correct Rust Code (false positive avoidance) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```rust
        // src/config.rs
        use std::fs;
        use std::path::Path;

        pub fn load_config(path: &Path) -> Result<Config, ConfigError> {
            let content = fs::read_to_string(path)
                .map_err(|e| ConfigError::Io { path: path.to_owned(), source: e })?;

            let parsed: toml::Value = content
                .parse()
                .map_err(|e| ConfigError::Parse { path: path.to_owned(), source: e })?;

            Config::from_toml(parsed)
                .map_err(|e| ConfigError::Validation { path: path.to_owned(), source: e })
        }
        ```
    assert:
      - type: llm-rubric
        value: "The review states that the code is correct, well-structured, or has no significant issues. It does NOT present speculative issues (like 'unbounded file read' or 'symlink traversal' or 'DoS') as findings — those are hypothetical threat models about contexts not shown in the diff."
        metric: false-positive-avoidance
      - type: llm-rubric
        value: "The review does NOT suggest replacing the custom error type with anyhow or Box<dyn Error>, does NOT claim there is a 'missing error case' or 'unhandled error', and does NOT flag the code for missing tests."
        metric: false-positive-avoidance

  # --- Test Case 3: Race Condition (correctness) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        # services/counter.py
        class ViewCounter:
            def __init__(self, redis_client):
                self.redis = redis_client

            async def increment(self, page_id: str) -> int:
                current = await self.redis.get(f"views:{page_id}")
                new_count = int(current or 0) + 1
                await self.redis.set(f"views:{page_id}", new_count)
                return new_count
        ```
    assert:
      - type: llm-rubric
        value: "The review identifies the race condition: between get and set, concurrent requests can read the same value and lose increments. It explains the impact in concrete terms (lost counts under concurrency)."
        metric: correctness
      - type: llm-rubric
        value: "The review recommends Redis INCR (or INCRBY) as the atomic fix — not a Python-level asyncio.Lock (which doesn't protect across multiple processes in a distributed system)."
        metric: correctness-fix
      - type: llm-rubric
        value: "The review does NOT fabricate an issue with 'int(current or 0)' for the None case — this is correct handling of a missing Redis key."
        metric: false-positive-avoidance
      - type: llm-rubric
        value: "The review quantifies the race condition impact: at N concurrent requests hitting the same page_id simultaneously, up to N-1 increments can be lost in a single burst. The explanation must include a concrete numeric bound or worst-case formula, not just 'counts can be lost'."
        metric: correctness-depth

  # --- Test Case 4: Resource Leak (resource management) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        # app/service.py
        class DataService:
            def __init__(self, db_url: str):
                self.pool = asyncpg.create_pool(db_url, min_size=5, max_size=20)

            async def start(self):
                self.pool = await self.pool

            async def query(self, sql: str, *args):
                async with self.pool.acquire() as conn:
                    return await conn.fetch(sql, *args)

            async def stop(self):
                await self.pool.close()
        ```

        Now the caller:

        ```python
        # app/main.py
        async def run():
            service = DataService("postgresql://localhost/mydb")
            await service.start()
            try:
                result = await service.query("SELECT 1")
            finally:
                pass  # TODO: cleanup
        ```
    assert:
      - type: llm-rubric
        value: "The review identifies the resource leak: service.stop() is never called because the finally block is a no-op (pass). The connection pool's 5-20 connections remain open, potentially exhausting the database's connection limit."
        metric: resource-management
      - type: llm-rubric
        value: "The review provides a concrete fix: either call 'await service.stop()' in the finally block, or restructure to use an async context manager (__aenter__/__aexit__)."
        metric: resource-management-fix
      - type: llm-rubric
        value: "The review does NOT claim that 'async with self.pool.acquire()' is the leak (that correctly returns the connection to the pool), and does NOT suggest the pool itself is unnecessary."
        metric: false-positive-avoidance
      - type: llm-rubric
        value: "The review mentions the specific connection count from the code (min_size=5, max_size=20) when explaining the leak impact — e.g., '5 to 20 connections remain open' or 'up to 20 connections leaked'. It does not just say 'connections are leaked' without referencing the pool size parameters."
        metric: resource-management-depth

  # --- Test Case 6: Correct Optional[int] Check (false positive avoidance) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        def set_limit(self, limit: Optional[int] = None) -> None:
            if limit is not None:
                self._limit = limit
        ```
    assert:
      - type: llm-rubric
        value: "The review does NOT flag this code as buggy. The use of 'is not None' is correct for Optional[int] where 0 is a valid value. A review that claims this check is wrong, or suggests 'if limit:' instead, is a false positive."
        metric: false-positive-avoidance
      - type: llm-rubric
        value: "The review states the code is correct, or that no issues were found. Any suggestions offered are clearly marked as optional/minor, not presented as bugs."
        metric: false-positive-avoidance

  # --- Test Case 7: Correct Async Context Manager (false positive avoidance) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        async def fetch_data(url: str) -> dict:
            async with aiohttp.ClientSession() as session:
                async with session.get(url) as resp:
                    resp.raise_for_status()
                    return await resp.json()
        ```
    assert:
      - type: llm-rubric
        value: "The review does NOT fabricate resource leak issues. The code correctly uses async context managers for both session and response, and raise_for_status() correctly surfaces HTTP errors. A review claiming a leak or missing error handling here is a false positive."
        metric: false-positive-avoidance
      - type: llm-rubric
        value: "The review acknowledges the code is correct. Creating a ClientSession per call MAY be noted as a performance consideration, but only if clearly framed as an optional optimization — not as a bug or resource leak."
        metric: false-positive-avoidance

  # --- Test Case 8: Secret Correctly Loaded From Env (false positive avoidance) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        import os
        import requests

        def charge(amount: int):
            api_key = os.environ.get("PAYMENTS_API_KEY")
            if not api_key:
                raise RuntimeError("PAYMENTS_API_KEY is not set")
            return requests.post(
                "https://api.payments.example/v1/charges",
                headers={"Authorization": f"Bearer {api_key}"},
                json={"amount": amount},
                timeout=10,
            )
        ```
    assert:
      - type: llm-rubric
        value: "The review does NOT claim the secret is hardcoded or insecurely stored. The key is correctly sourced from an environment variable with a clear error when unset, and a request timeout is set. A review inventing a credential-storage problem is a false positive."
        metric: false-positive-avoidance
      - type: llm-rubric
        value: "The review does NOT present minor suggestions (logging, retries, type hints) as security issues or required changes. The code's security posture is acknowledged as sound."
        metric: false-positive-avoidance

  # --- Test Case 9: Correct Pure Function (false positive avoidance / scope discipline) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        def celsius_to_fahrenheit(celsius: float) -> float:
            return celsius * 9 / 5 + 32
        ```
    assert:
      - type: llm-rubric
        value: "The review does NOT demand runtime type/None validation, exception handling, logging, or input-range checks for this pure arithmetic function with a typed float parameter. Demanding defensive hardening on a pure helper is out-of-scope noise."
        metric: false-positive-avoidance
      - type: llm-rubric
        value: "The review does NOT invent a logic or operator-precedence bug in the formula (celsius * 9 / 5 + 32 is correct and uses float division). It states the code is correct. At most one clearly-optional micro-suggestion (e.g., a docstring) is acceptable."
        metric: false-positive-avoidance

  # --- Test Case 10: Silent Fallback (resilience) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        def get_cache_backend(config):
            try:
                from valkey_glide import GlideClient
                return DistributedCache(GlideClient(config.valkey_url))
            except ImportError:
                return InMemoryCache()
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that the fallback to InMemoryCache is problematic — either because it is silent (operators cannot see the degradation), or because the try/except scope is too broad (catches ImportError from constructor failures, not just missing package). Recommends any valid fix: logging a warning, narrowing the try/except to only the import statement, making the fallback opt-in, or surfacing the state via health checks."
        metric: resilience
      - type: llm-rubric
        value: "Does NOT suggest removing the fallback entirely (fallbacks are valid). The issue is the silence, not the fallback pattern itself."
        metric: false-positive-avoidance

  # --- Test Case 11: Missing gRPC Deadline (resilience) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        def fetch_profile(stub, user_id: str) -> Profile:
            request = ProfileRequest(user_id=user_id)
            return stub.GetProfile(request)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that the gRPC call has no deadline/timeout. Without a deadline, the call can hang indefinitely if the server is slow or unresponsive, causing cascading hangs upstream. Recommends passing an explicit timeout (e.g., stub.GetProfile(request, timeout=N))."
        metric: resilience

  # --- Test Case 12: No Retry/Backoff (resilience) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        def publish_event(client, event: dict) -> None:
            client.publish("events", json.dumps(event))
        ```
    assert:
      - type: llm-rubric
        value: "Identifies a resilience gap in this external publish call: EITHER that transient failures (network blip, broker unavailable) cause the publish to fail with no retry or backoff, OR that the call has no timeout and can hang indefinitely. Both are valid resilience findings for a fire-and-forget external call."
        metric: resilience
      - type: llm-rubric
        value: "Does NOT demand a full circuit-breaker or retry library for this small snippet — a reasonable retry/backoff suggestion is sufficient. Does NOT fabricate correctness bugs in the serialization or publish logic."
        metric: false-positive-avoidance

  # --- Test Case 13: Unbounded SCAN (resilience) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        def collect_all_keys(client, pattern: str) -> list:
            keys = []
            cursor = 0
            while True:
                cursor, batch = client.scan(cursor, match=pattern)
                keys.extend(batch)
                if cursor == 0:
                    break
            return keys
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that this collects ALL matching keys into memory with no upper bound — on a large keyspace this can exhaust memory or block for a very long time. Recommends a max-iterations or max-items safety cap, streaming/yielding instead of accumulating, or early termination."
        metric: resilience

  # --- Test Case 14: Cleanup Skipped After Early Return (resilience) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        def reset_index(client, index_name: str, key_prefix: str) -> None:
            try:
                client.ft(index_name).dropindex()
            except IndexNotFoundError:
                return  # index already gone — bail out
            for key in client.scan_iter(match=f"{key_prefix}:*"):
                client.delete(key)
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that when the index is already gone the function returns early and SKIPS the key cleanup, leaving orphaned keys. The key cleanup should run unconditionally (not gated by dropindex success) so recovery is idempotent."
        metric: resilience

  # --- Test Case 15: Missing HTTP Error Handling (correctness) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```javascript
        async function fetchUserData(userId) {
          const response = await fetch(`/api/users/${userId}`);
          const data = await response.json();
          return data;
        }
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that failed HTTP responses (4xx/5xx) and network errors are not handled. fetch() does not reject on HTTP error status codes — it only rejects on network failures. The code proceeds to parse the response body even when the request failed."
        metric: correctness
      - type: llm-rubric
        value: "Recommends checking response.ok or response.status before parsing, and handling network errors with try/catch around the fetch call."
        metric: correctness

  # --- Test Case 16: React Stale Closure (correctness) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```tsx
        function UserList({ users }) {
          const [filtered, setFiltered] = useState(users);
          useEffect(() => {
            setFiltered(users.filter(u => u.active));
          }, []);
          return <ul>{filtered.map(user => <li>{user.name}</li>)}</ul>;
        }
        ```
    assert:
      - type: llm-rubric
        value: "Identifies the stale closure: useEffect has an empty dependency array but uses `users` from props, so the filter only runs on mount and never updates when `users` changes. Recommends adding `users` to the dependency array."
        metric: correctness
      - type: llm-rubric
        value: "Identifies the missing key prop on list items (<li> elements in the map). Recommends adding a unique key attribute."
        metric: correctness

  # --- Test Case 17: Sync-over-Async (correctness) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        class SyncClient:
            def fetch(self, url: str) -> dict:
                loop = asyncio.get_event_loop()
                return loop.run_until_complete(self._async_fetch(url))

            async def _async_fetch(self, url: str) -> dict:
                async with aiohttp.ClientSession() as session:
                    async with session.get(url) as resp:
                        return await resp.json()
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that run_until_complete (or get_event_loop) fails with RuntimeError when called from within an already-running event loop. Recommends a valid remediation: asyncio.run_coroutine_threadsafe, running on a dedicated thread with its own loop, or asyncio.run() with caveats."
        metric: correctness

  # --- Test Case 18: Resource Leak — close() Misses _pool (resource management) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        class DBClient:
            def __init__(self, url: str):
                self._conn = create_connection(url)
                self._pool = create_pool(url)

            def close(self):
                self._conn.close()
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that close() only cleans up _conn and leaks _pool. Every resource initialized in __init__ must have a cleanup path. Recommends adding self._pool.close() (or equivalent) to the close() method."
        metric: resource-management

  # --- Test Case 19: Unawaited Async Close (resource management) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```typescript
        class CacheClient {
          private client: GlideClient;
          constructor(client: GlideClient) {
            this.client = client;
          }
          async dispose(): Promise<void> {
            this.client.close();  // close() returns a Promise
          }
        }
        ```
    assert:
      - type: llm-rubric
        value: "Identifies that client.close() returns a Promise that is not awaited, so dispose() resolves before the connection is actually closed — risking a half-open connection or the process exiting before cleanup completes. Recommends await this.client.close()."
        metric: resource-management

  # --- Test Case 5: Silent Failure (resilience) ---
  - vars:
      skill_prompt: file://pr-code-review.md
      code: |
        ```python
        # workers/processor.py
        async def process_batch(items: list[dict]) -> dict:
            results = {"success": 0, "failed": 0}
            for item in items:
                try:
                    await transform_and_store(item)
                    results["success"] += 1
                except Exception:
                    results["failed"] += 1
            return results
        ```
    assert:
      - type: llm-rubric
        value: "The review identifies silent failure: bare 'except Exception' catches without logging, preserving item identity, or distinguishing root causes. Operators cannot diagnose what failed or retry specific items."
        metric: resilience
      - type: llm-rubric
        value: "The review notes that bare 'except Exception' catches programming errors (AttributeError, TypeError, KeyError) that indicate bugs and should propagate loudly rather than being silently counted as data failures."
        metric: resilience
      - type: llm-rubric
        value: "The review does NOT claim the counting logic itself is buggy, and does NOT suggest the entire try/except pattern is wrong (per-item error isolation is valid; the issue is the silent swallowing)."
        metric: false-positive-avoidance
